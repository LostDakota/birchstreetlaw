# ============================================================
# build.yml — Birch Street Law PLLC CI/CD Pipeline
#
# Triggers on push to main branch.
# Builds the SvelteKit static site and deploys via SFTP to Dreamhost.
# ============================================================

name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy to Dreamhost
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the static site
      - name: Build
        run: npm run build

      # 5. Upload build output as artifact
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: build/
          retention-days: 7

      # 6. Deploy via rsync over SSH (password-based)
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via rsync over SSH
        run: |
          sshpass -p "${{ secrets.DREAMHOST_SFTP_PASSWORD }}" rsync -avz \
            -e "ssh -p 22 -o StrictHostKeyChecking=no" \
            ./build/ \
            ${{ secrets.DREAMHOST_SFTP_USERNAME }}@${{ secrets.DREAMHOST_SFTP_HOST }}:/home/dh_wzakre/birchstreetlaw.com/
